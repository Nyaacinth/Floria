"$schema" = "../node_modules/@tauri-apps/cli/config.schema.json"

productName = "Floria"
version = "../package.json"
identifier = "work.nyaacinth.app.floria"

[build]
frontendDist = "../dist"
devUrl = "http://localhost:5173"
beforeDevCommand = "bun run dev"
beforeBuildCommand = "bun run build"

[[app.windows]]
label = "main"
title = "Floria"
width = 800
height = 600
resizable = true
fullscreen = false
visible = false

[app.security]
csp = "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' https: data:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self';"
devCsp = "default-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data: blob:;"

[bundle]
active = true
targets = "all"
icon = [
    "icons/16x16.png",
    "icons/16x16@2x.png",
    "icons/32x32.png",
    "icons/32x32@2x.png",
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/256x256.png",
    "icons/512x512@2x.png",
    "icons/512x512.png",
    "icons/512x512@2x.png",
    "icons/1024x1024.png",
    "icons/icon.icns",
    "icons/icon.ico",
]

[bundle.macOS]
hardenedRuntime = true
entitlements = "./entitlements.plist"
